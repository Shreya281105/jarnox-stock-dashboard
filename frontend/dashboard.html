<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JarNox · Stock Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="data.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg:     #08090d;
    --bg2:    #0e1018;
    --bg3:    #141620;
    --border: rgba(255,255,255,0.07);
    --border2:rgba(255,255,255,0.14);
    --text:   #e8eaf0;
    --muted:  #6a6e7e;
    --accent: #c8f135;
    --green:  #3df5b0;
    --red:    #ff4d6d;
    --yellow: #f5c842;
    --mono:   'DM Mono', monospace;
    --sans:   'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; min-height: 100vh; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 2px; }

  /* ── Top bar ── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 52px; background: rgba(8,9,13,0.94); backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 16px;
  }
  .topbar-logo { font-family: var(--sans); font-size: 15px; font-weight: 800; letter-spacing: -0.5px; color: var(--accent); white-space: nowrap; }
  .topbar-logo span { color: var(--text); }
  .topbar-ticker-strip { flex: 1; overflow: hidden; mask-image: linear-gradient(to right, transparent, black 4%, black 96%, transparent); }
  .ticker-inner { display: flex; gap: 32px; white-space: nowrap; animation: scroll-ticker 45s linear infinite; }
  .ticker-item { display: flex; gap: 6px; align-items: baseline; font-size: 11px; }
  .ticker-sym { color: var(--muted); }
  .ticker-chg.up { color: var(--green); }
  .ticker-chg.dn { color: var(--red); }
  @keyframes scroll-ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  .badge { font-size: 10px; padding: 3px 9px; border-radius: 4px; font-family: var(--sans); font-weight: 600; letter-spacing: 0.5px; }
  .bull { background: rgba(61,245,176,0.12); color: var(--green); border: 1px solid rgba(61,245,176,0.2); }
  .bear { background: rgba(255,77,109,0.12); color: var(--red); border: 1px solid rgba(255,77,109,0.2); }

  /* ── Layout ── */
  .layout { display: flex; height: 100vh; padding-top: 52px; }

  /* ── Sidebar ── */
  .sidebar { width: 240px; flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-head { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); }
  .sidebar-label { font-size: 9px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 9px; }
  .search-box { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 12px; padding: 7px 10px; outline: none; }
  .search-box::placeholder { color: var(--muted); }
  .search-box:focus { border-color: var(--border2); }
  .stock-list { flex: 1; overflow-y: auto; padding: 6px; }
  .stock-item { padding: 9px 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 9px; transition: background 0.12s; border: 1px solid transparent; margin-bottom: 2px; }
  .stock-item:hover { background: var(--bg3); }
  .stock-item.active { background: var(--bg3); border-color: var(--border2); }
  .sdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .sinfo { flex: 1; min-width: 0; }
  .ssym { font-family: var(--sans); font-weight: 700; font-size: 12px; }
  .sname { font-size: 10px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sright { text-align: right; flex-shrink: 0; }
  .sprice { font-size: 12px; }
  .schg { font-size: 10px; }
  .up { color: var(--green); } .dn { color: var(--red); }

  /* ── Main ── */
  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

  /* Header */
  .stock-header { padding: 20px 24px 4px; display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .sh-left { display: flex; flex-direction: column; gap: 3px; }
  .sh-sym { font-family: var(--sans); font-size: 28px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; }
  .sh-name { font-size: 11px; color: var(--muted); }
  .sh-sec { font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; background: rgba(200,241,53,0.1); color: var(--accent); display: inline-block; margin-top: 2px; }
  .sh-right { text-align: right; }
  .sh-price { font-family: var(--sans); font-size: 32px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
  .sh-chg { font-size: 13px; margin-top: 3px; }

  /* Stats */
  .stat-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 10px; padding: 14px 24px; }
  .scard { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 13px; }
  .slabel { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .sval { font-family: var(--sans); font-size: 15px; font-weight: 700; }
  .sval.acc { color: var(--accent); } .sval.g { color: var(--green); } .sval.r { color: var(--red); }

  /* Chart area */
  .chart-section { padding: 0 24px 14px; }
  .chart-toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .tabs { display: flex; gap: 4px; }
  .tab { font-family: var(--sans); font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 5px; cursor: pointer; transition: all 0.12s; border: 1px solid var(--border); color: var(--muted); background: transparent; }
  .tab.active, .tab:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }
  .tab.active { color: var(--accent); border-color: rgba(200,241,53,0.3); }
  .range-tabs { display: flex; gap: 3px; }
  .rtab { font-size: 10px; font-weight: 600; padding: 4px 9px; border-radius: 4px; cursor: pointer; border: 1px solid var(--border); color: var(--muted); background: transparent; font-family: var(--sans); transition: all 0.12s; }
  .rtab.active { background: rgba(200,241,53,0.1); color: var(--accent); border-color: rgba(200,241,53,0.3); }
  .chart-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; height: 290px; position: relative; }
  canvas { display: block !important; }

  /* Compare */
  .compare-section { padding: 0 24px 14px; }
  .compare-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .cmp-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .cmp-selects { display: flex; gap: 8px; align-items: center; }
  select { background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 11px; padding: 5px 8px; border-radius: 5px; outline: none; cursor: pointer; }
  select:focus { border-color: var(--border2); }
  .cmp-btn { font-family: var(--sans); font-size: 11px; font-weight: 700; padding: 5px 14px; border-radius: 5px; cursor: pointer; background: var(--accent); color: var(--bg); border: none; transition: opacity 0.12s; }
  .cmp-btn:hover { opacity: 0.85; }
  .cmp-chart-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; height: 210px; }
  .cmp-stats { display: flex; gap: 10px; margin-top: 10px; }
  .cmp-stat { flex: 1; background: var(--bg3); border-radius: 6px; padding: 10px 12px; }
  .cmp-sym { font-family: var(--sans); font-weight: 700; font-size: 11px; margin-bottom: 4px; }
  .cmp-val { font-size: 13px; }
  .cmp-corr { font-size: 11px; color: var(--muted); padding: 8px 12px; background: var(--bg3); border-radius: 6px; margin-top: 8px; display: none; }

  /* Bottom row */
  .bottom-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 0 24px 24px; }
  .panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .ptitle { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; font-weight: 600; }

  .pred-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .pred-row:last-child { border-bottom: none; }
  .pred-date { color: var(--muted); font-size: 11px; }
  .pred-val { font-size: 12px; }

  .gl-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .gl-row:last-child { border-bottom: none; }
  .gl-sym { font-family: var(--sans); font-weight: 700; font-size: 12px; }
  .gl-name { font-size: 10px; color: var(--muted); }
  .gl-chg { font-weight: 600; font-size: 12px; }

  .sect-row { margin-bottom: 10px; }
  .sect-row:last-child { margin-bottom: 0; }
  .sect-head { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .sect-name { font-size: 11px; }
  .sect-ret { font-size: 11px; font-weight: 500; }
  .bar-bg { background: var(--bg3); border-radius: 2px; height: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }

  .ma-leg { display: flex; gap: 12px; flex-wrap: wrap; }
  .ma-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--muted); }
  .ma-line { width: 14px; height: 2px; display: inline-block; border-radius: 1px; }

  .fade-in { animation: fi 0.25s ease forwards; }
  @keyframes fi { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-logo">JAR<span>NOX</span>&nbsp;<span style="color:var(--muted);font-weight:400;font-size:11px">/ NSE Intelligence</span></div>
  <div class="topbar-ticker-strip"><div class="ticker-inner" id="tickerEl"></div></div>
  <div class="badge" id="sentBadge"></div>
  <div style="font-size:10px;color:var(--muted)" id="mktStat"></div>
</div>

<!-- Layout -->
<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-label">NSE Equities · 12</div>
      <input class="search-box" id="searchBox" placeholder="Search symbol or name…" type="text"/>
    </div>
    <div class="stock-list" id="stockList"></div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="stock-header" id="stockHeader"></div>
    <div class="stat-grid" id="statGrid"></div>

    <!-- Chart -->
    <div class="chart-section">
      <div class="chart-toolbar">
        <div style="display:flex;gap:8px;align-items:center">
          <div class="tabs">
            <button class="tab active" onclick="switchChart('price',this)">Price</button>
            <button class="tab" onclick="switchChart('returns',this)">Daily Returns</button>
            <button class="tab" onclick="switchChart('volume',this)">Volume</button>
          </div>
          <div class="ma-leg" id="maLeg">
            <div class="ma-item"><span class="ma-line" style="background:#c8f135"></span>MA7</div>
            <div class="ma-item"><span class="ma-line" style="background:#3df5b0"></span>MA20</div>
          </div>
        </div>
        <div class="range-tabs">
          <button class="rtab" onclick="setRange(14,this)">2W</button>
          <button class="rtab active" onclick="setRange(30,this)">1M</button>
          <button class="rtab" onclick="setRange(90,this)">3M</button>
          <button class="rtab" onclick="setRange(180,this)">6M</button>
          <button class="rtab" onclick="setRange(365,this)">1Y</button>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
    </div>

    <!-- Compare -->
    <div class="compare-section">
      <div class="compare-panel">
        <div class="cmp-header">
          <div class="ptitle" style="margin-bottom:0">Compare Stocks · Normalized Returns</div>
          <div class="cmp-selects">
            <select id="cmp1"></select>
            <span style="color:var(--muted);font-size:11px">vs</span>
            <select id="cmp2"></select>
            <button class="cmp-btn" onclick="runCompare()">Run</button>
          </div>
        </div>
        <div class="cmp-chart-wrap"><canvas id="cmpChart"></canvas></div>
        <div class="cmp-stats" id="cmpStats"></div>
        <div class="cmp-corr" id="cmpCorr"></div>
      </div>
    </div>

    <!-- Bottom Row -->
    <div class="bottom-row">
      <!-- Predictions -->
      <div class="panel">
        <div class="ptitle">ML Forecast · Next 10 Days</div>
        <div id="predRows"></div>
        <div style="font-size:9px;color:var(--muted);margin-top:8px;border-top:1px solid var(--border);padding-top:8px">Model: Linear Regression · scikit-learn</div>
      </div>
      <!-- Gainers / Losers -->
      <div class="panel">
        <div class="tabs" style="margin-bottom:12px">
          <button class="tab active" style="flex:1;border-radius:5px 0 0 5px" onclick="switchGL('gainers',this)">▲ Top Gainers</button>
          <button class="tab" style="flex:1;border-radius:0 5px 5px 0" onclick="switchGL('losers',this)">▼ Top Losers</button>
        </div>
        <div id="glRows"></div>
      </div>
      <!-- Sector -->
      <div class="panel">
        <div class="ptitle">Sector Performance · 30D</div>
        <div id="sectorRows"></div>
      </div>
    </div>
  </div>
</div>

<script>
const SYMBOLS = Object.keys(DB.meta);
const SCOLORS = {
  RELIANCE:'#f5c842',TCS:'#3df5b0',INFY:'#c8f135',HDFCBANK:'#42a5f5',
  ICICIBANK:'#7ecef5',WIPRO:'#f584ff',BAJFINANCE:'#b084f5',SBIN:'#ff8c42',
  TATAMOTORS:'#ff6b6b',MARUTI:'#ffd166',SUNPHARMA:'#06d6a0',LTIM:'#4cc9f0'
};
const SEC_COLORS = {IT:'#3df5b0',Banking:'#c8f135',Energy:'#f5c842',Auto:'#ff8c42',Finance:'#b084f5',Pharma:'#42c5f5'};

let activeSym  = 'TCS';
let activeRange = 30;
let activeChart = 'price';
let glMode = 'gainers';
let mainChart = null, cmpChart = null;

// ── Ticker ──────────────────────────────────────────
function buildTicker() {
  let h = '';
  for (let r=0; r<2; r++) {
    SYMBOLS.forEach(s => {
      const st = DB.latest_stats[s];
      const u = st.change >= 0;
      h += `<div class="ticker-item">
        <span style="color:var(--muted)">${s}</span>
        <span>₹${st.close.toLocaleString('en-IN')}</span>
        <span class="ticker-chg ${u?'up':'dn'}">${u?'+':''}${st.change_pct.toFixed(2)}%</span>
      </div>`;
    });
  }
  document.getElementById('tickerEl').innerHTML = h;
  const m = EXTRAS.market;
  const b = document.getElementById('sentBadge');
  b.className = 'badge ' + (m.sentiment==='Bullish'?'bull':'bear');
  b.textContent = m.sentiment.toUpperCase();
  document.getElementById('mktStat').textContent = `${m.gainers}↑  ${m.losers}↓`;
}

// ── Sidebar ─────────────────────────────────────────
function buildSidebar(q='') {
  const f = q.toUpperCase();
  document.getElementById('stockList').innerHTML = SYMBOLS
    .filter(s => !f || s.includes(f) || DB.meta[s].name.toUpperCase().includes(f))
    .map(sym => {
      const s = DB.latest_stats[sym];
      const u = s.change >= 0;
      return `<div class="stock-item ${sym===activeSym?'active':''}" onclick="selectSym('${sym}')">
        <div class="sdot" style="background:${SCOLORS[sym]}"></div>
        <div class="sinfo">
          <div class="ssym">${sym}</div>
          <div class="sname">${DB.meta[sym].name}</div>
        </div>
        <div class="sright">
          <div class="sprice">₹${s.close.toLocaleString('en-IN')}</div>
          <div class="schg ${u?'up':'dn'}">${u?'+':''}${s.change_pct.toFixed(2)}%</div>
        </div>
      </div>`;
    }).join('');
}
document.getElementById('searchBox').addEventListener('input', e => buildSidebar(e.target.value));

// ── Header ──────────────────────────────────────────
function renderHeader() {
  const s = DB.latest_stats[activeSym], u = s.change >= 0;
  document.getElementById('stockHeader').innerHTML = `
    <div class="sh-left fade-in">
      <div class="sh-sym">${activeSym}</div>
      <div class="sh-name">${DB.meta[activeSym].name}</div>
      <div class="sh-sec">${DB.meta[activeSym].sector}</div>
    </div>
    <div class="sh-right fade-in">
      <div class="sh-price">₹${s.close.toLocaleString('en-IN',{minimumFractionDigits:2})}</div>
      <div class="sh-chg ${u?'up':'dn'}">${u?'▲':'▼'} ${Math.abs(s.change).toFixed(2)} (${u?'+':''}${s.change_pct.toFixed(2)}%)</div>
    </div>`;
}

// ── Stat Grid ───────────────────────────────────────
function renderStats() {
  const s = DB.latest_stats[activeSym];
  document.getElementById('statGrid').innerHTML = [
    ['Open',     `₹${s.open.toLocaleString('en-IN')}`,  ''],
    ['High',     `₹${s.high.toLocaleString('en-IN')}`,  'g'],
    ['Low',      `₹${s.low.toLocaleString('en-IN')}`,   'r'],
    ['Volume',   fmtVol(s.volume),                       'acc'],
    ['52W High', `₹${s.w52_high.toLocaleString('en-IN')}`,''],
    ['52W Low',  `₹${s.w52_low.toLocaleString('en-IN')}`, ''],
  ].map(([l,v,c]) => `<div class="scard fade-in"><div class="slabel">${l}</div><div class="sval ${c}">${v}</div></div>`).join('');
}
function fmtVol(v) {
  if (v>=1e7) return (v/1e7).toFixed(2)+' Cr';
  if (v>=1e5) return (v/1e5).toFixed(2)+' L';
  return v.toLocaleString('en-IN');
}

// ── Charts ──────────────────────────────────────────
function getSlice() { return DB.stock_data[activeSym].slice(-activeRange); }

const cOpts = (yPfx='') => ({
  responsive: true, maintainAspectRatio: false,
  animation: {duration:280},
  plugins: {
    legend: {display:false},
    tooltip: {
      backgroundColor:'#141620', borderColor:'rgba(255,255,255,0.1)', borderWidth:1,
      titleColor:'#6a6e7e', bodyColor:'#e8eaf0', padding:10,
      callbacks: { label: ctx => `  ${ctx.dataset.label}: ${yPfx}${typeof ctx.parsed.y==='number'?ctx.parsed.y.toFixed(2):ctx.parsed.y}` }
    }
  },
  scales: {
    x: { ticks:{color:'#6a6e7e',font:{family:'DM Mono',size:10},maxTicksLimit:8}, grid:{color:'rgba(255,255,255,0.03)'} },
    y: { ticks:{color:'#6a6e7e',font:{family:'DM Mono',size:10}},               grid:{color:'rgba(255,255,255,0.04)'} }
  }
});

function hexA(hex, a) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function renderMainChart() {
  const rows = getSlice();
  const labels = rows.map(r=>r.date.slice(5));
  if (mainChart) { mainChart.destroy(); mainChart = null; }
  const canvas = document.getElementById('mainChart');
  let cfg;
  const col = SCOLORS[activeSym]||'#c8f135';

  if (activeChart === 'price') {
    cfg = {
      type:'line',
      data: { labels, datasets: [
        { label:activeSym, data:rows.map(r=>r.close), borderColor:col, borderWidth:2, pointRadius:0, tension:0.3, fill:true,
          backgroundColor:(ctx)=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,ctx.chart.height);g.addColorStop(0,hexA(col,.18));g.addColorStop(1,hexA(col,0));return g;} },
        { label:'MA7',  data:rows.map(r=>r.ma7),  borderColor:'#c8f135', borderWidth:1.5, borderDash:[4,3], pointRadius:0, tension:0.3, fill:false },
        { label:'MA20', data:rows.map(r=>r.ma20), borderColor:'#3df5b0', borderWidth:1.5, borderDash:[6,4], pointRadius:0, tension:0.3, fill:false },
      ]},
      options: cOpts('₹')
    };
    document.getElementById('maLeg').style.display='flex';
  } else if (activeChart === 'returns') {
    const rets = rows.map(r=>r.daily_return||0);
    cfg = {
      type:'bar',
      data: { labels, datasets:[{ label:'Daily Return %', data:rets, backgroundColor:rets.map(v=>v>=0?'rgba(61,245,176,0.65)':'rgba(255,77,109,0.65)'), borderRadius:2 }]},
      options: cOpts('%')
    };
    document.getElementById('maLeg').style.display='none';
  } else {
    cfg = {
      type:'bar',
      data: { labels, datasets:[{ label:'Volume (L)', data:rows.map(r=>(r.volume||0)/1e5), backgroundColor:hexA(col,.5), borderRadius:2 }]},
      options: cOpts('L')
    };
    document.getElementById('maLeg').style.display='none';
  }
  mainChart = new Chart(canvas, cfg);
}

function switchChart(t, btn) {
  activeChart=t;
  document.querySelectorAll('.chart-section .tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderMainChart();
}
function setRange(n, btn) {
  activeRange=n;
  document.querySelectorAll('.rtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderMainChart();
}

// ── Predictions ─────────────────────────────────────
function renderPredictions() {
  const sym = activeSym;
  const preds = DB.predictions[sym]||[];
  const lc = DB.latest_stats[sym].close;
  document.getElementById('predRows').innerHTML = preds.slice(0,10).map(p => {
    const u = p.predicted_close >= lc;
    return `<div class="pred-row">
      <span class="pred-date">${p.date}</span>
      <span class="pred-val ${u?'up':'dn'}">₹${p.predicted_close.toLocaleString('en-IN',{minimumFractionDigits:2})} ${u?'↑':'↓'}</span>
    </div>`;
  }).join('');
}

// ── Gainers / Losers ────────────────────────────────
function renderGL() {
  const rows = SYMBOLS
    .map(s=>({sym:s,name:DB.meta[s].name,...DB.latest_stats[s]}))
    .sort((a,b)=>glMode==='gainers'?b.change_pct-a.change_pct:a.change_pct-b.change_pct)
    .slice(0,6);
  document.getElementById('glRows').innerHTML = rows.map(r=>{
    const u=r.change_pct>=0;
    return `<div class="gl-row" onclick="selectSym('${r.sym}')">
      <div><div class="gl-sym">${r.sym}</div><div class="gl-name">${r.name}</div></div>
      <div class="gl-chg ${u?'up':'dn'}">${u?'+':''}${r.change_pct.toFixed(2)}%</div>
    </div>`;
  }).join('');
}
function switchGL(m, btn) {
  glMode=m;
  document.querySelectorAll('.bottom-row .tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGL();
}

// ── Sector ──────────────────────────────────────────
function renderSector() {
  const max = Math.max(...EXTRAS.sector_perf.map(s=>Math.abs(s.avg_return)));
  document.getElementById('sectorRows').innerHTML = EXTRAS.sector_perf.map(s=>{
    const u=s.avg_return>=0; const col=SEC_COLORS[s.sector]||'#c8f135';
    return `<div class="sect-row">
      <div class="sect-head">
        <span class="sect-name">${s.sector}</span>
        <span class="sect-ret ${u?'up':'dn'}">${u?'+':''}${s.avg_return.toFixed(2)}%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.abs(s.avg_return)/max*100}%;background:${col}"></div></div>
    </div>`;
  }).join('');
}

// ── Compare ─────────────────────────────────────────
function initCompareSelects() {
  const h = SYMBOLS.map(s=>`<option value="${s}">${s}</option>`).join('');
  document.getElementById('cmp1').innerHTML=h;
  document.getElementById('cmp2').innerHTML=h;
  document.getElementById('cmp1').value='TCS';
  document.getElementById('cmp2').value='INFY';
  runCompare();
}
function runCompare() {
  const s1=document.getElementById('cmp1').value, s2=document.getElementById('cmp2').value;
  if (s1===s2) return;
  const d1=DB.stock_data[s1].slice(-90), d2=DB.stock_data[s2].slice(-90);
  const n=Math.min(d1.length,d2.length);
  const c1=d1.slice(-n).map(r=>r.close), c2=d2.slice(-n).map(r=>r.close);
  const labels=d1.slice(-n).map(r=>r.date.slice(5));
  const base1=c1[0], base2=c2[0];
  const n1=c1.map(v=>(v/base1)*100), n2=c2.map(v=>(v/base2)*100);
  const col1=SCOLORS[s1], col2=SCOLORS[s2];
  if (cmpChart){cmpChart.destroy();cmpChart=null;}
  cmpChart = new Chart(document.getElementById('cmpChart'), {
    type:'line',
    data:{ labels, datasets:[
      {label:s1,data:n1,borderColor:col1,borderWidth:2,pointRadius:0,tension:0.3,fill:false},
      {label:s2,data:n2,borderColor:col2,borderWidth:2,pointRadius:0,tension:0.3,fill:false},
    ]},
    options:{...cOpts(''),plugins:{
      legend:{display:true,labels:{color:'#6a6e7e',font:{family:'DM Mono',size:10},boxWidth:12}},
      tooltip:{backgroundColor:'#141620',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'#6a6e7e',bodyColor:'#e8eaf0',padding:10}
    }}
  });
  const ret1=((c1[c1.length-1]-c1[0])/c1[0]*100).toFixed(2);
  const ret2=((c2[c2.length-1]-c2[0])/c2[0]*100).toFixed(2);
  document.getElementById('cmpStats').innerHTML=`
    <div class="cmp-stat"><div class="cmp-sym" style="color:${col1}">${s1}</div><div class="cmp-val ${ret1>=0?'up':'dn'}">${ret1>=0?'+':''}${ret1}% (90D)</div></div>
    <div class="cmp-stat"><div class="cmp-sym" style="color:${col2}">${s2}</div><div class="cmp-val ${ret2>=0?'up':'dn'}">${ret2>=0?'+':''}${ret2}% (90D)</div></div>`;
  const corr=pearson(c1,c2);
  const cd=document.getElementById('cmpCorr');
  cd.style.display='block';
  cd.innerHTML=`Pearson Correlation: <strong style="color:var(--accent)">${corr.toFixed(4)}</strong> &nbsp;·&nbsp; ${Math.abs(corr)>.85?'Strongly correlated':Math.abs(corr)>.5?'Moderately correlated':'Weakly correlated'}`;
}

function pearson(a,b){
  const n=Math.min(a.length,b.length),ax=a.slice(-n),bx=b.slice(-n);
  const ma=ax.reduce((s,v)=>s+v,0)/n,mb=bx.reduce((s,v)=>s+v,0)/n;
  let num=0,da=0,db=0;
  for(let i=0;i<n;i++){num+=(ax[i]-ma)*(bx[i]-mb);da+=(ax[i]-ma)**2;db+=(bx[i]-mb)**2;}
  return num/Math.sqrt(da*db);
}

// ── Select Stock ───────────────────────────────────
function selectSym(sym) {
  activeSym=sym; activeChart='price';
  document.querySelectorAll('.chart-section .tab').forEach((b,i)=>b.classList.toggle('active',i===0));
  buildSidebar(document.getElementById('searchBox').value);
  renderHeader(); renderStats(); renderMainChart(); renderPredictions();
}

// ── Init ───────────────────────────────────────────
buildTicker();
buildSidebar();
renderHeader();
renderStats();
renderMainChart();
renderPredictions();
renderGL();
renderSector();
initCompareSelects();
</script>
